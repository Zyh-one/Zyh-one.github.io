# NexT theme configuration for AI Infra Notes.
# Keep theme customizations here instead of editing node_modules.

scheme: Gemini
darkmode: false

custom_file_path:
  style: source/_data/styles.styl

menu:
  home: / || fa fa-home
  archives: /archives/ || fa fa-archive
  categories: /categories/ || fa fa-th
  tags: /tags/ || fa fa-tags

menu_settings:
  icons: true
  badges: false

sidebar:
  position: right
  width_expanded: 300
  width_dual_column: 260
  display: post
  padding: 18
  offset: 12

avatar:
  url:
  rounded: false
  rotated: false

site_state: true

social:

social_icons:
  enable: true
  icons_only: false
  transition: false

toc:
  enable: true
  number: true
  wrap: true
  expand_all: false
  max_depth: 4

footer:
  since: 2026
  icon:
    name: fa fa-code
    animated: false
    color: "#0f766e"
  copyright: zyh
  powered: true

creative_commons:
  license: by-nc-sa
  size: small
  sidebar: false
  post: false

excerpt_description: true
read_more_btn: true

post_meta:
  item_text: true
  created_at: true
  updated_at:
    enable: true
    another_day: true
  categories: true

post_navigation: left

text_align:
  desktop: start
  mobile: start

mobile_layout_economy: false

codeblock:
  theme:
    light: default
    dark: stackoverflow-dark
  prism:
    light: prism
    dark: prism-dark
  copy_button:
    enable: true
    style: flat
  fold:
    enable: false
    height: 500
  language: true

back2top:
  enable: true
  sidebar: false
  scrollpercent: true

reading_progress:
  enable: true
  start_at: left
  position: top
  reversed: false
  color: "#0f766e"
  height: 3px

bookmark:
  enable: false

motion:
  enable: true
  async: false
  duration: 180
  transition:
    menu_item: fadeInDown
    post_block: fadeIn
    post_header: fadeInDown
    post_body: fadeIn
    coll_header: fadeInLeft
    sidebar: fadeInUp
